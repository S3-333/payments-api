# =============================================================================
# Docker Compose: solo levanta MySQL en un contenedor para desarrollo local.
# La API FastAPI NO va aquí: la corres en tu máquina con uvicorn y te conectas a localhost:3306.
# Comandos típicos:
#   docker compose up -d          # arranca MySQL en segundo plano
#   docker compose ps             # ver estado
#   docker compose logs -f db     # ver logs de MySQL
# =============================================================================

services:
  db:
    image: mysql:8
    container_name: payments_db

    # Variables que el script de entrada de la imagen MySQL usa al crear la instancia:
    environment:
      MYSQL_ROOT_PASSWORD: root # usuario root (solo dev; en prod usar secretos)
      MYSQL_DATABASE: payments # base creada automáticamente al iniciar
      MYSQL_USER: user # usuario de aplicación (coincide con DATABASE_URL por defecto)
      MYSQL_PASSWORD: password

    # Mapeo puerto: izquierda = tu PC, derecha = dentro del contenedor
    ports:
      - "3306:3306"

    # Volumen nombrado: los datos sobreviven a reinicios del contenedor (persistencia)
    volumes:
      - mysql_data:/var/lib/mysql

# Volumen declarado arriba (mysql_data): Docker crea y gestiona el almacenamiento
volumes:
  mysql_data:
